name: Amazon Deals Bot — Daily Run

on:
  schedule:
    - cron: '0 7 * * *'    # 08:00 ora italiana (UTC+1)
    - cron: '0 10 * * *'   # 11:00 ora italiana
    - cron: '0 13 * * *'   # 14:00 ora italiana
    - cron: '0 16 * * *'   # 17:00 ora italiana
    - cron: '0 19 * * *'   # 20:00 ora italiana
  workflow_dispatch:       # Permette avvio manuale da GitHub

jobs:
  amazon-deals:
    runs-on: ubuntu-latest
    timeout-minutes: 5     # Timeout dopo 5 min (dovrebbe finire in 30 sec)

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install dependencies
        run: pip install -r requirements.txt

      - name: ⚙️ Run bot job
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          AMAZON_AFFILIATE_TAG: ${{ secrets.AMAZON_AFFILIATE_TAG }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          RAPIDAPI_HOST: real-time-amazon-data.p.rapidapi.com
          MAX_DEALS_PER_RUN: '5'
          MIN_DISCOUNT_PERCENT: '20'
          AMAZON_COUNTRY: 'IT'
        run: python amazon_deals_bot_final.py

      - name: 📊 Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bot-logs
          path: bot.log
          retention-days: 7
