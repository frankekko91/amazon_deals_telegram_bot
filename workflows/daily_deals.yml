name: Amazon Deals Bot

on:
  schedule:
    - cron: '0 7 * * *'    # 08:00 ora italiana (UTC+1) — Buongiorno offerte
    - cron: '0 9 * * *'    # 10:00 ora italiana — Offerte mattina
    - cron: '0 11 * * *'   # 12:00 ora italiana — Offerte mezzogiorno
    - cron: '0 14 * * *'   # 15:00 ora italiana — Offerte pomeriggio
    - cron: '0 17 * * *'   # 18:00 ora italiana — Offerte aperitivo
    - cron: '0 19 * * *'   # 20:00 ora italiana — Offerte sera
  workflow_dispatch:        # Permette avvio manuale dalla tab Actions

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Installa dipendenze
        run: pip install requests python-telegram-bot schedule python-dotenv

      - name: 🤖 Avvia il bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          AMAZON_AFFILIATE_TAG: ${{ secrets.AMAZON_AFFILIATE_TAG }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          RAPIDAPI_HOST: ${{ secrets.RAPIDAPI_HOST }}
          MAX_DEALS_PER_RUN: ${{ secrets.MAX_DEALS_PER_RUN }}
          MIN_DISCOUNT_PERCENT: ${{ secrets.MIN_DISCOUNT_PERCENT }}
          AMAZON_COUNTRY: ${{ secrets.AMAZON_COUNTRY }}
        run: python amazon_deals_telegram_bot.py
